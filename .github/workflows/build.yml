name: Build Legend Delta Executor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Create Objective-C source code
        run: |
          cat > LegendDelta.m << 'EOF'
          #import <UIKit/UIKit.h>
          
          @interface LegendDelta : UIViewController
          @property (nonatomic, strong) UIView *floatingButton;
          @property (nonatomic, strong) UIView *mainPanel;
          @property (nonatomic, strong) UITextView *codeEditor;
          @property (nonatomic, strong) UITableView *scriptTable;
          @property (nonatomic, strong) UISearchBar *searchBar;
          @property (nonatomic, strong) NSArray *scripts;
          @property (nonatomic, assign) BOOL isMinimized;
          @end
          
          @implementation LegendDelta
          
          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor clearColor];
              self.isMinimized = YES;
              
              [self loadScripts];
              [self createFloatingButton];
              [self createMainPanel];
              
              self.floatingButton.hidden = NO;
              self.mainPanel.hidden = YES;
          }
          
          - (void)loadScripts {
              self.scripts = @[
                  @{@"name": @"Auto Farm", @"author": @"Legend", @"code": @"print('Auto Farm Started')"},
                  @{@"name": @"ESP Script", @"author": @"Delta", @"code": @"print('ESP Enabled')"},
                  @{@"name": @"Fly Hack", @"author": @"V", @"code": @"print('Fly Mode On')"}
              ];
          }
          
          - (void)createFloatingButton {
              self.floatingButton = [[UIView alloc] initWithFrame:CGRectMake([UIScreen mainScreen].bounds.size.width - 70, 100, 50, 50)];
              self.floatingButton.backgroundColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              self.floatingButton.layer.cornerRadius = 25;
              self.floatingButton.layer.shadowColor = [UIColor cyanColor].CGColor;
              self.floatingButton.layer.shadowRadius = 10;
              self.floatingButton.layer.shadowOpacity = 0.6;
              
              UILabel *logo = [[UILabel alloc] initWithFrame:CGRectMake(0, 0, 50, 50)];
              logo.text = @"L";
              logo.textAlignment = NSTextAlignmentCenter;
              logo.font = [UIFont boldSystemFontOfSize:28];
              logo.textColor = [UIColor whiteColor];
              [self.floatingButton addSubview:logo];
              
              UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(expandPanel)];
              [self.floatingButton addGestureRecognizer:tap];
              
              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(dragFloating:)];
              [self.floatingButton addGestureRecognizer:pan];
              
              [self.view addSubview:self.floatingButton];
          }
          
          - (void)createMainPanel {
              self.mainPanel = [[UIView alloc] initWithFrame:CGRectMake(20, 60, 350, 500)];
              self.mainPanel.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.1 alpha:0.92];
              self.mainPanel.layer.cornerRadius = 20;
              self.mainPanel.layer.borderWidth = 1;
              self.mainPanel.layer.borderColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:0.5].CGColor;
              
              // Title bar
              UIView *titleBar = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 350, 45)];
              titleBar.backgroundColor = [UIColor colorWithRed:0.0 green:0.2 blue:0.3 alpha:0.9];
              titleBar.layer.cornerRadius = 20;
              titleBar.layer.maskedCorners = kCALayerMinXMinYCorner | kCALayerMaxXMinYCorner;
              
              UILabel *titleLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 10, 200, 25)];
              titleLabel.text = @"LEGEND DELTA";
              titleLabel.font = [UIFont boldSystemFontOfSize:18];
              titleLabel.textColor = [UIColor whiteColor];
              [titleBar addSubview:titleLabel];
              
              UILabel *logoLabel = [[UILabel alloc] initWithFrame:CGRectMake(185, 5, 35, 35)];
              logoLabel.text = @"L";
              logoLabel.font = [UIFont boldSystemFontOfSize:24];
              logoLabel.textColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [titleBar addSubview:logoLabel];
              
              UIButton *minimizeBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              minimizeBtn.frame = CGRectMake(310, 10, 30, 25);
              [minimizeBtn setTitle:@"_" forState:UIControlStateNormal];
              [minimizeBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              [minimizeBtn addTarget:self action:@selector(minimizePanel) forControlEvents:UIControlEventTouchUpInside];
              [titleBar addSubview:minimizeBtn];
              
              [self.mainPanel addSubview:titleBar];
              
              // Tab buttons
              NSArray *tabNames = @[@"Editor", @"Search", @"Settings"];
              for (int i = 0; i < 3; i++) {
                  UIButton *tab = [UIButton buttonWithType:UIButtonTypeSystem];
                  tab.frame = CGRectMake(60 + (i * 95), 50, 80, 30);
                  [tab setTitle:tabNames[i] forState:UIControlStateNormal];
                  [tab setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
                  tab.tag = i;
                  [tab addTarget:self action:@selector(switchTab:) forControlEvents:UIControlEventTouchUpInside];
                  [self.mainPanel addSubview:tab];
              }
              
              // Code editor
              self.codeEditor = [[UITextView alloc] initWithFrame:CGRectMake(10, 90, 330, 320)];
              self.codeEditor.backgroundColor = [UIColor colorWithRed:0.02 green:0.02 blue:0.05 alpha:1.0];
              self.codeEditor.textColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              self.codeEditor.font = [UIFont fontWithName:@"Menlo" size:12];
              self.codeEditor.layer.cornerRadius = 10;
              self.codeEditor.text = @"-- Legend Delta Executor\n-- Paste your script here\n\nprint('Hello World!')";
              [self.mainPanel addSubview:self.codeEditor];
              
              // Execute button
              UIButton *execBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              execBtn.frame = CGRectMake(120, 420, 110, 40);
              [execBtn setTitle:@"▶ EXECUTE" forState:UIControlStateNormal];
              [execBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              execBtn.backgroundColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              execBtn.layer.cornerRadius = 20;
              [execBtn addTarget:self action:@selector(executeScript) forControlEvents:UIControlEventTouchUpInside];
              [self.mainPanel addSubview:execBtn];
              
              // Search bar (hidden by default)
              self.searchBar = [[UISearchBar alloc] initWithFrame:CGRectMake(10, 90, 330, 40)];
              self.searchBar.placeholder = @"Search scripts...";
              self.searchBar.hidden = YES;
              [self.mainPanel addSubview:self.searchBar];
              
              // Script table (hidden by default)
              self.scriptTable = [[UITableView alloc] initWithFrame:CGRectMake(10, 140, 330, 320) style:UITableViewStylePlain];
              self.scriptTable.backgroundColor = [UIColor clearColor];
              self.scriptTable.delegate = self;
              self.scriptTable.dataSource = self;
              self.scriptTable.hidden = YES;
              [self.mainPanel addSubview:self.scriptTable];
              
              // Settings panel (hidden by default)
              UIView *settingsView = [[UIView alloc] initWithFrame:CGRectMake(10, 90, 330, 370)];
              settingsView.backgroundColor = [UIColor clearColor];
              settingsView.hidden = YES;
              
              UILabel *scaleLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 20, 200, 30)];
              scaleLabel.text = @"UI Scale: 100%";
              scaleLabel.textColor = [UIColor whiteColor];
              [settingsView addSubview:scaleLabel];
              
              UISlider *scaleSlider = [[UISlider alloc] initWithFrame:CGRectMake(10, 50, 300, 30)];
              scaleSlider.minimumValue = 0.8;
              scaleSlider.maximumValue = 1.5;
              scaleSlider.value = 1.0;
              scaleSlider.tintColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [scaleSlider addTarget:self action:@selector(changeScale:) forControlEvents:UIControlEventValueChanged];
              [settingsView addSubview:scaleSlider];
              
              UISwitch *borderSwitch = [[UISwitch alloc] initWithFrame:CGRectMake(10, 100, 50, 30)];
              borderSwitch.on = YES;
              borderSwitch.onTintColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [borderSwitch addTarget:self action:@selector(toggleBorder:) forControlEvents:UIControlEventValueChanged];
              [settingsView addSubview:borderSwitch];
              
              UILabel *borderLabel = [[UILabel alloc] initWithFrame:CGRectMake(70, 105, 150, 30)];
              borderLabel.text = @"Window Borders";
              borderLabel.textColor = [UIColor whiteColor];
              [settingsView addSubview:borderLabel];
              
              UISwitch *glowSwitch = [[UISwitch alloc] initWithFrame:CGRectMake(10, 150, 50, 30)];
              glowSwitch.on = YES;
              glowSwitch.onTintColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [settingsView addSubview:glowSwitch];
              
              UILabel *glowLabel = [[UILabel alloc] initWithFrame:CGRectMake(70, 155, 150, 30)];
              glowLabel.text = @"Animate Glows";
              glowLabel.textColor = [UIColor whiteColor];
              [settingsView addSubview:glowLabel];
              
              [self.mainPanel addSubview:settingsView];
              
              // Drag to move panel
              UIPanGestureRecognizer *panelPan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(dragPanel:)];
              [self.mainPanel addGestureRecognizer:panelPan];
              
              [self.view addSubview:self.mainPanel];
          }
          
          - (void)executeScript {
              NSString *code = self.codeEditor.text;
              printf("Executing: %s\n", [code UTF8String]);
              
              // Show success notification
              UIView *notify = [[UIView alloc] initWithFrame:CGRectMake(10, 55, 330, 35)];
              notify.backgroundColor = [UIColor colorWithRed:0.0 green:0.78 blue:0.33 alpha:0.9];
              notify.layer.cornerRadius = 10;
              
              UILabel *label = [[UILabel alloc] initWithFrame:CGRectMake(10, 8, 310, 20)];
              label.text = @"✅ Script executed successfully!";
              label.textColor = [UIColor whiteColor];
              label.font = [UIFont boldSystemFontOfSize:12];
              label.textAlignment = NSTextAlignmentCenter;
              [notify addSubview:label];
              
              [self.mainPanel addSubview:notify];
              
              [UIView animateWithDuration:2.0 animations:^{
                  notify.alpha = 0;
              } completion:^(BOOL finished) {
                  [notify removeFromSuperview];
              }];
          }
          
          // TableView methods
          - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section {
              return self.scripts.count;
          }
          
          - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {
              UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"Cell"];
              if (!cell) {
                  cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle reuseIdentifier:@"Cell"];
                  cell.backgroundColor = [UIColor colorWithRed:0.1 green:0.1 blue:0.15 alpha:0.9];
                  cell.textLabel.textColor = [UIColor whiteColor];
                  cell.detailTextLabel.textColor = [UIColor lightGrayColor];
              }
              NSDictionary *script = self.scripts[indexPath.row];
              cell.textLabel.text = script[@"name"];
              cell.detailTextLabel.text = [NSString stringWithFormat:@"by %@", script[@"author"]];
              return cell;
          }
          
          - (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath {
              NSDictionary *script = self.scripts[indexPath.row];
              self.codeEditor.text = script[@"code"];
              [self switchTab:[self.mainPanel viewWithTag:0]];
              [tableView deselectRowAtIndexPath:indexPath animated:YES];
          }
          
          - (void)switchTab:(UIButton *)sender {
              // Hide all panels
              self.codeEditor.hidden = YES;
              self.searchBar.hidden = YES;
              self.scriptTable.hidden = YES;
              
              for (UIView *view in self.mainPanel.subviews) {
                  if (view.frame.origin.y == 90 && view.frame.size.height > 300 && view != self.codeEditor) {
                      view.hidden = YES;
                  }
              }
              
              // Show selected panel
              if (sender.tag == 0) {
                  self.codeEditor.hidden = NO;
              } else if (sender.tag == 1) {
                  self.searchBar.hidden = NO;
                  self.scriptTable.hidden = NO;
              } else if (sender.tag == 2) {
                  for (UIView *view in self.mainPanel.subviews) {
                      if (view.frame.origin.y == 90 && view.frame.size.height > 300 && view != self.codeEditor) {
                          view.hidden = NO;
                          break;
                      }
                  }
              }
          }
          
          - (void)expandPanel {
              self.isMinimized = NO;
              self.floatingButton.hidden = YES;
              self.mainPanel.hidden = NO;
          }
          
          - (void)minimizePanel {
              self.isMinimized = YES;
              self.floatingButton.hidden = NO;
              self.mainPanel.hidden = YES;
          }
          
          - (void)dragFloating:(UIPanGestureRecognizer *)gesture {
              CGPoint translation = [gesture translationInView:self.view];
              gesture.view.center = CGPointMake(gesture.view.center.x + translation.x, gesture.view.center.y + translation.y);
              [gesture setTranslation:CGPointZero inView:self.view];
              
              CGRect bounds = self.view.bounds;
              CGPoint center = gesture.view.center;
              center.x = MAX(25, MIN(bounds.size.width - 25, center.x));
              center.y = MAX(25, MIN(bounds.size.height - 25, center.y));
              gesture.view.center = center;
          }
          
          - (void)dragPanel:(UIPanGestureRecognizer *)gesture {
              CGPoint translation = [gesture translationInView:self.view];
              gesture.view.center = CGPointMake(gesture.view.center.x + translation.x, gesture.view.center.y + translation.y);
              [gesture setTranslation:CGPointZero inView:self.view];
          }
          
          - (void)changeScale:(UISlider *)sender {
              CGFloat scale = sender.value;
              self.mainPanel.transform = CGAffineTransformMakeScale(scale, scale);
          }
          
          - (void)toggleBorder:(UISwitch *)sender {
              self.mainPanel.layer.borderWidth = sender.on ? 1 : 0;
          }
          
          @end
          
          __attribute__((constructor)) static void init() {
              dispatch_async(dispatch_get_main_queue(), ^{
                  UIWindow *window = [[UIApplication sharedApplication] keyWindow];
                  LegendDelta *executor = [[LegendDelta alloc] init];
                  executor.view.frame = window.bounds;
                  [window addSubview:executor.view];
              });
          }
          EOF
      
      - name: Compile dylib
        run: |
          clang -dynamiclib \
            -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -fobjc-arc \
            -o LegendDelta.dylib \
            LegendDelta.m
          
          if [ -f LegendDelta.dylib ]; then
            echo "✅ Success!"
            file LegendDelta.dylib
          else
            echo "❌ Failed"
            exit 1
          fi
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: LegendDelta-Dylib
          path: LegendDelta.dylib
