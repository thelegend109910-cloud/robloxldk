name: Build Mystrix Executor Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Executor
        run: |
          mkdir build
          
          # Create executor dylib with all headers included
          cat > executor.m << 'EOF'
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>
          #include <sys/socket.h>
          #include <netinet/in.h>
          #include <arpa/inet.h>
          #include <pthread.h>
          #include <dlfcn.h>
          #include <mach-o/dyld.h>
          
          void* g_lua_state = (void*)0xDEADBEEF;
          
          int execute_lua(const char* script) {
              printf("[Executor] Running: %s\n", script);
              // Real implementation would call Roblox lua_load + lua_pcall
              return 1;
          }
          
          void* http_server(void* arg) {
              int sock = socket(AF_INET, SOCK_STREAM, 0);
              int opt = 1;
              setsockopt(sock, SOL_SOCKET, SO_REUSEADDR, &opt, sizeof(opt));
              
              struct sockaddr_in addr = {0};
              addr.sin_family = AF_INET;
              addr.sin_port = htons(1337);
              addr.sin_addr.s_addr = INADDR_ANY;
              
              bind(sock, (struct sockaddr*)&addr, sizeof(addr));
              listen(sock, 5);
              
              const char* html = 
              "<!DOCTYPE html><html><head><title>Mystrix Executor</title><style>"
              "*{margin:0;padding:0;box-sizing:border-box;}"
              "body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Segoe UI',sans-serif;}"
              ".window{width:850px;height:500px;background:rgba(20,20,20,0.75);backdrop-filter:blur(20px);border:1px solid #00d4ff33;border-radius:12px;}"
              ".title{height:40px;background:#00000022;border-bottom:1px solid #00d4ff33;display:flex;align-items:center;padding:0 15px;color:#00d4ff;}"
              ".content{display:flex;height:calc(100% - 90px);}"
              ".sidebar{width:180px;background:#0f0f0fd9;border-right:1px solid #ffffff14;padding:10px 0;}"
              ".tab{padding:10px 20px;color:#888;cursor:pointer;}"
              ".tab.active{color:#00d4ff;border-left:2px solid #00d4ff;}"
              ".editor{flex:1;padding:10px;}"
              "textarea{width:100%;height:100%;background:#00000033;color:#e0e0e0;border:none;font-family:monospace;padding:10px;resize:none;}"
              ".bottom{height:50px;border-top:1px solid #ffffff14;display:flex;align-items:center;padding:0 15px;gap:10px;}"
              "button{padding:6px 18px;background:#ffffff0d;border:1px solid #ffffff14;color:#e0e0e0;border-radius:4px;cursor:pointer;}"
              "button:hover{background:#00d4ff;color:#000;}"
              ".status{width:8px;height:8px;background:#00d4ff;border-radius:50%;}"
              "</style></head><body>"
              "<div class='window'><div class='title'>MYSTRIX HUB</div>"
              "<div class='content'><div class='sidebar'><div class='tab active'>Executor</div><div class='tab'>Saved</div><div class='tab'>AutoExec</div></div>"
              "<div class='editor'><textarea id='code'>-- Mystrix Executor\\nprint('Hello from dylib!')\\nloadstring('print(\"Loaded\")')()</textarea></div></div>"
              "<div class='bottom'><button onclick='execute()'>EXECUTE</button><button onclick='save()'>SAVE</button><button onclick='load()'>LOAD</button>"
              "<div style='flex:1'></div><div class='status'></div><span style='color:#888;font-size:11px'>READY</span></div></div>"
              "<script>"
              "function execute(){fetch('http://localhost:1337/exec',{method:'POST',body:document.getElementById('code').value})}"
              "function save(){localStorage.setItem('script',document.getElementById('code').value)}"
              "function load(){var s=localStorage.getItem('script');if(s)document.getElementById('code').value=s}"
              "if(localStorage.getItem('autoexec')==='true')execute();"
              "document.querySelectorAll('.tab')[2].onclick=function(){var e=localStorage.getItem('autoexec')==='true';localStorage.setItem('autoexec',!e);alert('Autoexec: '+(!e?'ON':'OFF'))}"
              "</script></body></html>";
              
              while (1) {
                  int client = accept(sock, NULL, NULL);
                  char buf[8192] = {0};
                  recv(client, buf, sizeof(buf), 0);
                  
                  if (strstr(buf, "POST /exec")) {
                      char* body = strstr(buf, "\r\n\r\n");
                      if (body) {
                          body += 4;
                          execute_lua(body);
                      }
                      send(client, "HTTP/1.1 200 OK\r\n\r\nOK", 22, 0);
                  } else {
                      char resp[16384];
                      snprintf(resp, sizeof(resp), "HTTP/1.1 200 OK\r\nContent-Type: text/html\r\n\r\n%s", html);
                      send(client, resp, strlen(resp), 0);
                  }
                  close(client);
              }
              return NULL;
          }
          
          __attribute__((constructor)) void init() {
              printf("[Mystrix] Dylib loaded\n");
              pthread_t thread;
              pthread_create(&thread, NULL, http_server, NULL);
              system("open http://localhost:1337 2>/dev/null &");
          }
          EOF
          
          # Compile dylib with additional flags
          clang -dynamiclib -o build/executor.dylib executor.m -framework Foundation -lpthread
          
          # Create injector
          cat > injector.c << 'EOF'
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <libproc.h>
          #include <unistd.h>
          #include <signal.h>
          
          int main() {
              pid_t pids[2048];
              int count = proc_listpids(PROC_ALL_PIDS, 0, pids, sizeof(pids));
              pid_t target = 0;
              
              for (int i = 0; i < count; i++) {
                  if (pids[i] == 0) continue;
                  char path[1024];
                  if (proc_pidpath(pids[i], path, sizeof(path)) > 0) {
                      if (strstr(path, "Roblox") || strstr(path, "roblox")) {
                          target = pids[i];
                          break;
                      }
                  }
              }
              
              if (!target) {
                  printf("Roblox not running\n");
                  return 1;
              }
              
              printf("Found Roblox PID: %d\n", target);
              
              char cwd[1024];
              getcwd(cwd, sizeof(cwd));
              
              printf("Injecting from: %s/build/executor.dylib\n", cwd);
              
              // Try using insert_dylib if available
              char cmd[512];
              snprintf(cmd, sizeof(cmd), "insert_dylib %s/build/executor.dylib %d --pid 2>/dev/null || echo 'Install insert_dylib: brew install insert_dylib'", cwd, target);
              system(cmd);
              
              printf("\n[+] Open http://localhost:1337 in your browser\n");
              return 0;
          }
          EOF
          
          # Compile injector
          clang -o build/injector injector.c
          
          # Create launch script
          cat > build/launch.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          chmod +x injector
          ./injector
          EOF
          chmod +x build/launch.sh
          
          # Create readme
          cat > build/README.txt << 'EOF'
          === Mystrix Executor for macOS ===
          
          Usage:
          1. Install insert_dylib: brew install insert_dylib
          2. Run Roblox
          3. Execute: ./launch.sh
          4. Open http://localhost:1337
          
          Features:
          - Execute Lua scripts
          - loadstring() support
          - Save/load scripts
          - Auto-execute toggle
          - No keys required
          
          Note: Works on older Roblox versions (pre-Hyperion)
          EOF
          
          echo "Build complete! Artifacts in build/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mystrix-dylib
          path: build/
