name: Build Legend Delta Executor

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Create Objective-C source code
        run: |
          cat > LegendDelta.m << 'EOF'
          #import <UIKit/UIKit.h>
          #import <objc/runtime.h>
          
          @interface LDRobloxExecutor : UIViewController
          @property (nonatomic, strong) UIWindow *overlayWindow;
          @property (nonatomic, strong) UIView *floatingButton;
          @property (nonatomic, strong) UIView *executorPanel;
          @property (nonatomic, strong) UITextView *codeEditor;
          @property (nonatomic, strong) UITableView *scriptsTable;
          @property (nonatomic, strong) UISearchBar *searchBar;
          @property (nonatomic, strong) NSMutableArray *scripts;
          @property (nonatomic, assign) BOOL isPanelVisible;
          @property (nonatomic, strong) UIPanGestureRecognizer *panelPan;
          @end
          
          @implementation LDRobloxExecutor
          
          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor clearColor];
              self.isPanelVisible = NO;
              
              [self setupScriptsDatabase];
              [self createOverlayWindow];
              [self createFloatingButton];
              [self createExecutorPanel];
          }
          
          - (UIWindow *)overlayWindow {
              if (!_overlayWindow) {
                  _overlayWindow = [[UIWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];
                  _overlayWindow.windowLevel = UIWindowLevelAlert + 1;
                  _overlayWindow.backgroundColor = [UIColor clearColor];
                  _overlayWindow.rootViewController = self;
                  _overlayWindow.hidden = NO;
              }
              return _overlayWindow;
          }
          
          - (void)setupScriptsDatabase {
              self.scripts = [NSMutableArray array];
              [self.scripts addObject:@{@"name": @"Infinite Yield", @"author": @"Edge", @"code": @"loadstring(game:HttpGet('https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source'))()", @"likes": @"15.4K"}];
              [self.scripts addObject:@{@"name": @"CMD-X", @"author": @"CMD-X Team", @"code": @"loadstring(game:HttpGet('https://raw.githubusercontent.com/CMD-X/CMD-X/master/Source', true))()", @"likes": @"12.2K"}];
              [self.scripts addObject:@{@"name": @"Dex Explorer", @"author": @"Dex", @"code": @"loadstring(game:HttpGet('https://raw.githubusercontent.com/pepega90/Dex-Explorer/main/Source.lua'))()", @"likes": @"9.8K"}];
              [self.scripts addObject:@{@"name": @"Auto Farm", @"author": @"Legend", @"code": @"-- Auto Farm Script\nlocal player = game.Players.LocalPlayer\nlocal character = player.Character\nprint('Auto Farm Started')", @"likes": @"5.1K"}];
              [self.scripts addObject:@{@"name": @"Fly + NoClip", @"author": @"Delta", @"code": @"-- Fly Script\nlocal plr = game.Players.LocalPlayer\nlocal char = plr.Character\nlocal root = char.HumanoidRootPart\nlocal bv = Instance.new('BodyVelocity')\nbv.MaxForce = Vector3.new(1,1,1)*1e5\nbv.Parent = root\ngame:GetService('UserInputService').InputBegan:connect(function(inp)\n    if inp.KeyCode == Enum.KeyCode.Space then\n        bv.Velocity = workspace.CurrentCamera.CFrame.LookVector * 100\n    end\nend)", @"likes": @"7.3K"}];
          }
          
          - (void)createOverlayWindow {
              self.overlayWindow.hidden = NO;
              [self.overlayWindow makeKeyAndVisible];
              [[UIApplication sharedApplication].delegate.window makeKeyWindow];
          }
          
          - (void)createFloatingButton {
              CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
              CGFloat screenHeight = [UIScreen mainScreen].bounds.size.height;
              
              self.floatingButton = [[UIView alloc] initWithFrame:CGRectMake(screenWidth - 65, screenHeight - 120, 50, 50)];
              self.floatingButton.backgroundColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              self.floatingButton.layer.cornerRadius = 25;
              self.floatingButton.layer.shadowColor = [UIColor cyanColor].CGColor;
              self.floatingButton.layer.shadowRadius = 8;
              self.floatingButton.layer.shadowOpacity = 0.7;
              self.floatingButton.layer.shadowOffset = CGSizeZero;
              self.floatingButton.userInteractionEnabled = YES;
              
              UILabel *logo = [[UILabel alloc] initWithFrame:CGRectMake(0, 0, 50, 50)];
              logo.text = @"L";
              logo.textAlignment = NSTextAlignmentCenter;
              logo.font = [UIFont fontWithName:@"HelveticaNeue-Bold" size:28];
              logo.textColor = [UIColor whiteColor];
              logo.userInteractionEnabled = NO;
              [self.floatingButton addSubview:logo];
              
              UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(toggleExecutorPanel)];
              [self.floatingButton addGestureRecognizer:tap];
              
              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(dragFloatingButton:)];
              [self.floatingButton addGestureRecognizer:pan];
              
              [self.overlayWindow addSubview:self.floatingButton];
          }
          
          - (void)createExecutorPanel {
              CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
              CGFloat screenHeight = [UIScreen mainScreen].bounds.size.height;
              
              // Main panel container
              self.executorPanel = [[UIView alloc] initWithFrame:CGRectMake(10, 40, screenWidth - 20, screenHeight - 80)];
              self.executorPanel.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.12 alpha:0.95];
              self.executorPanel.layer.cornerRadius = 20;
              self.executorPanel.layer.borderWidth = 1.5;
              self.executorPanel.layer.borderColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:0.6].CGColor;
              self.executorPanel.clipsToBounds = YES;
              self.executorPanel.hidden = YES;
              self.executorPanel.userInteractionEnabled = YES;
              
              // Title bar
              UIView *titleBar = [[UIView alloc] initWithFrame:CGRectMake(0, 0, self.executorPanel.frame.size.width, 50)];
              titleBar.backgroundColor = [UIColor colorWithRed:0.0 green:0.15 blue:0.25 alpha:0.95];
              titleBar.userInteractionEnabled = YES;
              
              UILabel *titleLabel = [[UILabel alloc] initWithFrame:CGRectMake(50, 10, 150, 30)];
              titleLabel.text = @"LEGEND DELTA";
              titleLabel.font = [UIFont boldSystemFontOfSize:20];
              titleLabel.textColor = [UIColor whiteColor];
              [titleBar addSubview:titleLabel];
              
              UILabel *logoLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 8, 35, 35)];
              logoLabel.text = @"L";
              logoLabel.font = [UIFont boldSystemFontOfSize:26];
              logoLabel.textColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              logoLabel.layer.shadowColor = [UIColor cyanColor].CGColor;
              logoLabel.layer.shadowRadius = 5;
              logoLabel.layer.shadowOpacity = 0.8;
              [titleBar addSubview:logoLabel];
              
              UIButton *minimizeBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              minimizeBtn.frame = CGRectMake(self.executorPanel.frame.size.width - 45, 10, 35, 35);
              [minimizeBtn setTitle:@"−" forState:UIControlStateNormal];
              [minimizeBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              minimizeBtn.titleLabel.font = [UIFont boldSystemFontOfSize:24];
              minimizeBtn.backgroundColor = [UIColor colorWithRed:0.2 green:0.2 blue:0.3 alpha:0.8];
              minimizeBtn.layer.cornerRadius = 17.5;
              [minimizeBtn addTarget:self action:@selector(hideExecutorPanel) forControlEvents:UIControlEventTouchUpInside];
              [titleBar addSubview:minimizeBtn];
              
              // Tab bar
              UIView *tabBar = [[UIView alloc] initWithFrame:CGRectMake(0, 50, self.executorPanel.frame.size.width, 40)];
              tabBar.backgroundColor = [UIColor colorWithRed:0.08 green:0.08 blue:0.15 alpha:0.9];
              
              NSArray *tabTitles = @[@"Editor", @"Library", @"Settings"];
              for (int i = 0; i < 3; i++) {
                  UIButton *tabBtn = [UIButton buttonWithType:UIButtonTypeSystem];
                  tabBtn.frame = CGRectMake(10 + (i * 90), 5, 80, 30);
                  [tabBtn setTitle:tabTitles[i] forState:UIControlStateNormal];
                  [tabBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
                  tabBtn.titleLabel.font = [UIFont systemFontOfSize:14];
                  tabBtn.tag = i;
                  [tabBtn addTarget:self action:@selector(switchTab:) forControlEvents:UIControlEventTouchUpInside];
                  [tabBar addSubview:tabBtn];
              }
              
              // Code Editor (Tab 0)
              self.codeEditor = [[UITextView alloc] initWithFrame:CGRectMake(10, 95, self.executorPanel.frame.size.width - 20, self.executorPanel.frame.size.height - 210)];
              self.codeEditor.backgroundColor = [UIColor colorWithRed:0.02 green:0.02 blue:0.06 alpha:1.0];
              self.codeEditor.textColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              self.codeEditor.font = [UIFont fontWithName:@"Menlo" size:13];
              self.codeEditor.layer.cornerRadius = 10;
              self.codeEditor.layer.borderWidth = 0.5;
              self.codeEditor.layer.borderColor = [UIColor colorWithRed:0.0 green:0.5 blue:0.6 alpha:0.5].CGColor;
              self.codeEditor.text = @"-- Legend Delta Executor\n-- Paste your Lua script here\n\nprint('Hello from Legend Delta!')\n\n-- Example: Infinite Yield\n-- loadstring(game:HttpGet('https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source'))()";
              
              // Execute button
              UIButton *executeBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              executeBtn.frame = CGRectMake(self.executorPanel.frame.size.width / 2 - 70, self.executorPanel.frame.size.height - 95, 140, 45);
              [executeBtn setTitle:@"▶ EXECUTE SCRIPT" forState:UIControlStateNormal];
              [executeBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              executeBtn.titleLabel.font = [UIFont boldSystemFontOfSize:14];
              executeBtn.backgroundColor = [UIColor colorWithRed:0.0 green:0.6 blue:0.7 alpha:1.0];
              executeBtn.layer.cornerRadius = 22;
              [executeBtn addTarget:self action:@selector(executeCurrentScript) forControlEvents:UIControlEventTouchUpInside];
              
              // Search bar (Tab 1)
              self.searchBar = [[UISearchBar alloc] initWithFrame:CGRectMake(10, 95, self.executorPanel.frame.size.width - 20, 45)];
              self.searchBar.placeholder = @"Search scripts...";
              self.searchBar.backgroundColor = [UIColor clearColor];
              self.searchBar.searchTextField.backgroundColor = [UIColor colorWithRed:0.1 green:0.1 blue:0.2 alpha:1.0];
              self.searchBar.searchTextField.textColor = [UIColor whiteColor];
              self.searchBar.hidden = YES;
              
              // Scripts table (Tab 1)
              self.scriptsTable = [[UITableView alloc] initWithFrame:CGRectMake(10, 145, self.executorPanel.frame.size.width - 20, self.executorPanel.frame.size.height - 255) style:UITableViewStylePlain];
              self.scriptsTable.backgroundColor = [UIColor clearColor];
              self.scriptsTable.separatorColor = [UIColor colorWithWhite:0.2 alpha:0.5];
              self.scriptsTable.delegate = self;
              self.scriptsTable.dataSource = self;
              self.scriptsTable.hidden = YES;
              
              // Settings panel (Tab 2)
              UIView *settingsPanel = [[UIView alloc] initWithFrame:CGRectMake(10, 95, self.executorPanel.frame.size.width - 20, self.executorPanel.frame.size.height - 150)];
              settingsPanel.backgroundColor = [UIColor clearColor];
              settingsPanel.hidden = YES;
              
              UILabel *scaleLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 20, 200, 25)];
              scaleLabel.text = @"UI Scale: 100%";
              scaleLabel.textColor = [UIColor whiteColor];
              [settingsPanel addSubview:scaleLabel];
              
              UISlider *scaleSlider = [[UISlider alloc] initWithFrame:CGRectMake(10, 50, 280, 30)];
              scaleSlider.minimumValue = 0.7;
              scaleSlider.maximumValue = 1.3;
              scaleSlider.value = 1.0;
              scaleSlider.tintColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [scaleSlider addTarget:self action:@selector(changeUIScale:) forControlEvents:UIControlEventValueChanged];
              [settingsPanel addSubview:scaleSlider];
              
              UILabel *cornerLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 100, 200, 25)];
              cornerLabel.text = @"Corner Radius: 20px";
              cornerLabel.textColor = [UIColor whiteColor];
              [settingsPanel addSubview:cornerLabel];
              
              UISlider *cornerSlider = [[UISlider alloc] initWithFrame:CGRectMake(10, 130, 280, 30)];
              cornerSlider.minimumValue = 5;
              cornerSlider.maximumValue = 40;
              cornerSlider.value = 20;
              cornerSlider.tintColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [cornerSlider addTarget:self action:@selector(changeCornerRadius:) forControlEvents:UIControlEventValueChanged];
              [settingsPanel addSubview:cornerSlider];
              
              UISwitch *borderSwitch = [[UISwitch alloc] initWithFrame:CGRectMake(10, 180, 50, 30)];
              borderSwitch.on = YES;
              borderSwitch.onTintColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [borderSwitch addTarget:self action:@selector(toggleBorder:) forControlEvents:UIControlEventValueChanged];
              [settingsPanel addSubview:borderSwitch];
              
              UILabel *borderLabel = [[UILabel alloc] initWithFrame:CGRectMake(70, 183, 150, 25)];
              borderLabel.text = @"Window Borders";
              borderLabel.textColor = [UIColor whiteColor];
              [settingsPanel addSubview:borderLabel];
              
              // Add all subviews
              [self.executorPanel addSubview:titleBar];
              [self.executorPanel addSubview:tabBar];
              [self.executorPanel addSubview:self.codeEditor];
              [self.executorPanel addSubview:executeBtn];
              [self.executorPanel addSubview:self.searchBar];
              [self.executorPanel addSubview:self.scriptsTable];
              [self.executorPanel addSubview:settingsPanel];
              
              // Store references for tab switching
              objc_setAssociatedObject(self.executorPanel, "codeEditor", self.codeEditor, OBJC_ASSOCIATION_RETAIN_NONATOMIC);
              objc_setAssociatedObject(self.executorPanel, "searchBar", self.searchBar, OBJC_ASSOCIATION_RETAIN_NONATOMIC);
              objc_setAssociatedObject(self.executorPanel, "scriptsTable", self.scriptsTable, OBJC_ASSOCIATION_RETAIN_NONATOMIC);
              objc_setAssociatedObject(self.executorPanel, "settingsPanel", settingsPanel, OBJC_ASSOCIATION_RETAIN_NONATOMIC);
              
              // Draggable panel
              self.panelPan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(dragExecutorPanel:)];
              [self.executorPanel addGestureRecognizer:self.panelPan];
              
              [self.overlayWindow addSubview:self.executorPanel];
          }
          
          - (void)toggleExecutorPanel {
              self.isPanelVisible = !self.isPanelVisible;
              self.executorPanel.hidden = !self.isPanelVisible;
              
              if (self.isPanelVisible) {
                  [self.overlayWindow bringSubviewToFront:self.executorPanel];
                  // Animate in
                  self.executorPanel.transform = CGAffineTransformMakeScale(0.9, 0.9);
                  self.executorPanel.alpha = 0;
                  [UIView animateWithDuration:0.25 animations:^{
                      self.executorPanel.transform = CGAffineTransformIdentity;
                      self.executorPanel.alpha = 1;
                  }];
              }
          }
          
          - (void)hideExecutorPanel {
              self.isPanelVisible = NO;
              [UIView animateWithDuration:0.25 animations:^{
                  self.executorPanel.transform = CGAffineTransformMakeScale(0.9, 0.9);
                  self.executorPanel.alpha = 0;
              } completion:^(BOOL finished) {
                  self.executorPanel.hidden = YES;
                  self.executorPanel.transform = CGAffineTransformIdentity;
                  self.executorPanel.alpha = 1;
              }];
          }
          
          - (void)switchTab:(UIButton *)sender {
              // Hide all tab content
              self.codeEditor.hidden = YES;
              self.searchBar.hidden = YES;
              self.scriptsTable.hidden = YES;
              
              for (UIView *view in self.executorPanel.subviews) {
                  if (view.frame.origin.y > 90 && view.frame.size.height > 300 && view != self.codeEditor) {
                      view.hidden = YES;
                  }
              }
              
              // Show selected tab
              if (sender.tag == 0) {
                  self.codeEditor.hidden = NO;
              } else if (sender.tag == 1) {
                  self.searchBar.hidden = NO;
                  self.scriptsTable.hidden = NO;
                  [self.scriptsTable reloadData];
              } else if (sender.tag == 2) {
                  for (UIView *view in self.executorPanel.subviews) {
                      if (view.frame.origin.y > 90 && view.frame.size.height > 300 && view != self.codeEditor) {
                          view.hidden = NO;
                          break;
                      }
                  }
              }
          }
          
          - (void)executeCurrentScript {
              NSString *script = self.codeEditor.text;
              if (script.length == 0) return;
              
              printf("[Legend Delta] Executing script\n");
              printf("%s\n", [script UTF8String]);
              
              // Show success notification
              UIView *notif = [[UIView alloc] initWithFrame:CGRectMake(10, 55, self.executorPanel.frame.size.width - 20, 40)];
              notif.backgroundColor = [UIColor colorWithRed:0.0 green:0.7 blue:0.3 alpha:0.95];
              notif.layer.cornerRadius = 10;
              
              UILabel *msg = [[UILabel alloc] initWithFrame:CGRectMake(10, 10, notif.frame.size.width - 20, 20)];
              msg.text = @"✅ Script executed successfully!";
              msg.textColor = [UIColor whiteColor];
              msg.font = [UIFont boldSystemFontOfSize:13];
              msg.textAlignment = NSTextAlignmentCenter;
              [notif addSubview:msg];
              
              [self.executorPanel addSubview:notif];
              
              [UIView animateWithDuration:2.5 animations:^{
                  notif.alpha = 0;
              } completion:^(BOOL finished) {
                  [notif removeFromSuperview];
              }];
              
              // Here you would inject into Roblox's Lua state
              // For demo, we just print
          }
          
          - (void)changeUIScale:(UISlider *)slider {
              CGFloat scale = slider.value;
              self.executorPanel.transform = CGAffineTransformMakeScale(scale, scale);
          }
          
          - (void)changeCornerRadius:(UISlider *)slider {
              self.executorPanel.layer.cornerRadius = slider.value;
          }
          
          - (void)toggleBorder:(UISwitch *)sw {
              self.executorPanel.layer.borderWidth = sw.on ? 1.5 : 0;
          }
          
          - (void)dragFloatingButton:(UIPanGestureRecognizer *)gesture {
              CGPoint translation = [gesture translationInView:self.overlayWindow];
              gesture.view.center = CGPointMake(gesture.view.center.x + translation.x, gesture.view.center.y + translation.y);
              [gesture setTranslation:CGPointZero inView:self.overlayWindow];
              
              if (gesture.state == UIGestureRecognizerStateEnded) {
                  CGRect bounds = self.overlayWindow.bounds;
                  CGPoint center = gesture.view.center;
                  center.x = MAX(25, MIN(bounds.size.width - 25, center.x));
                  center.y = MAX(25, MIN(bounds.size.height - 25, center.y));
                  [UIView animateWithDuration:0.2 animations:^{
                      gesture.view.center = center;
                  }];
              }
          }
          
          - (void)dragExecutorPanel:(UIPanGestureRecognizer *)gesture {
              CGPoint translation = [gesture translationInView:self.overlayWindow];
              gesture.view.center = CGPointMake(gesture.view.center.x + translation.x, gesture.view.center.y + translation.y);
              [gesture setTranslation:CGPointZero inView:self.overlayWindow];
          }
          
          // UITableViewDataSource
          - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section {
              return self.scripts.count;
          }
          
          - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {
              static NSString *cellId = @"ScriptCell";
              UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:cellId];
              if (!cell) {
                  cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle reuseIdentifier:cellId];
                  cell.backgroundColor = [UIColor colorWithRed:0.08 green:0.08 blue:0.12 alpha:1.0];
                  cell.textLabel.textColor = [UIColor whiteColor];
                  cell.detailTextLabel.textColor = [UIColor lightGrayColor];
                  cell.selectionStyle = UITableViewCellSelectionStyleGray;
              }
              
              NSDictionary *script = self.scripts[indexPath.row];
              cell.textLabel.text = script[@"name"];
              cell.detailTextLabel.text = [NSString stringWithFormat:@"by %@  ❤️ %@", script[@"author"], script[@"likes"]];
              
              // Add execute button
              UIButton *runBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              runBtn.frame = CGRectMake(tableView.frame.size.width - 85, 8, 70, 30);
              [runBtn setTitle:@"▶ RUN" forState:UIControlStateNormal];
              [runBtn setTitleColor:[UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0] forState:UIControlStateNormal];
              runBtn.backgroundColor = [UIColor colorWithRed:0.0 green:0.3 blue:0.4 alpha:0.8];
              runBtn.layer.cornerRadius = 8;
              runBtn.tag = indexPath.row;
              [runBtn addTarget:self action:@selector(runScriptFromLibrary:) forControlEvents:UIControlEventTouchUpInside];
              [cell.contentView addSubview:runBtn];
              
              return cell;
          }
          
          - (void)runScriptFromLibrary:(UIButton *)sender {
              NSDictionary *script = self.scripts[sender.tag];
              self.codeEditor.text = script[@"code"];
              [self switchTab:[self.executorPanel viewWithTag:0]];
              [self executeCurrentScript];
          }
          
          - (CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath *)indexPath {
              return 55;
          }
          
          @end
          
          // Initialize when loaded
          __attribute__((constructor)) static void init() {
              dispatch_async(dispatch_get_main_queue(), ^{
                  LDRobloxExecutor *executor = [[LDRobloxExecutor alloc] init];
                  executor.overlayWindow.hidden = NO;
              });
          }
          EOF
      
      - name: Compile dylib
        run: |
          clang -dynamiclib \
            -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -fobjc-arc \
            -o LegendDelta.dylib \
            LegendDelta.m
          
          if [ -f LegendDelta.dylib ]; then
            echo "✅ Compilation successful!"
            file LegendDelta.dylib
            ls -la LegendDelta.dylib
          else
            echo "❌ Compilation failed!"
            exit 1
          fi
      
      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: LegendDelta-Executor
          path: LegendDelta.dylib
