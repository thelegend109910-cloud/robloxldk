name: Build Roblox Executor Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos-executor:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create executor source files
        run: |
          mkdir src
          
          # === MAIN EXECUTOR DYLIB ===
          cat > src/executor.mm << 'EOF'
          #import <Foundation/Foundation.h>
          #import <dlfcn.h>
          #import <mach-o/dyld.h>
          #import <sys/socket.h>
          #import <netinet/in.h>
          #import <arpa/inet.h>
          #import <pthread.h>
          
          // Roblox Lua C API signatures (old macOS Roblox)
          typedef void* (*luaL_newstate_t)(void);
          typedef void (*lua_close_t)(void* L);
          typedef void (*lua_getglobal_t)(void* L, const char* name);
          typedef void (*lua_pushstring_t)(void* L, const char* s);
          typedef int (*lua_pcall_t)(void* L, int nargs, int nresults, int errfunc);
          typedef void (*lua_pop_t)(void* L, int n);
          typedef int (*lua_load_t)(void* L, int (*reader)(void*, void*, size_t*), void* data, const char* chunkname);
          typedef void (*lua_pushcclosure_t)(void* L, int (*fn)(void*), int n);
          
          static luaL_newstate_t luaL_newstate = nullptr;
          static lua_close_t lua_close = nullptr;
          static lua_getglobal_t lua_getglobal = nullptr;
          static lua_pushstring_t lua_pushstring = nullptr;
          static lua_pcall_t lua_pcall = nullptr;
          static lua_pop_t lua_pop = nullptr;
          static lua_load_t lua_load = nullptr;
          static lua_pushcclosure_t lua_pushcclosure = nullptr;
          
          void* g_lua_state = nullptr;
          
          void FindLuaSymbols() {
              // Search in Roblox binary
              for (uint32_t i = 0; i < _dyld_image_count(); i++) {
                  const char* name = _dyld_get_image_name(i);
                  if (strstr(name, "RobloxPlayer")) {
                      void* handle = dlopen(name, RTLD_LAZY);
                      if (handle) {
                          luaL_newstate = (luaL_newstate_t)dlsym(handle, "luaL_newstate");
                          lua_close = (lua_close_t)dlsym(handle, "lua_close");
                          lua_getglobal = (lua_getglobal_t)dlsym(handle, "lua_getglobal");
                          lua_pushstring = (lua_pushstring_t)dlsym(handle, "lua_pushstring");
                          lua_pcall = (lua_pcall_t)dlsym(handle, "lua_pcall");
                          lua_pop = (lua_pop_t)dlsym(handle, "lua_pop");
                          lua_load = (lua_load_t)dlsym(handle, "lua_load");
                          lua_pushcclosure = (lua_pushcclosure_t)dlsym(handle, "lua_pushcclosure");
                          break;
                      }
                  }
              }
          }
          
          void* GetRobloxLuaState() {
              // Pattern scan for lua_State* in global storage (simplified)
              // Real implementation would scan __DATA segment
              return (void*)0xDEADBEEF; // Placeholder — needs runtime patching
          }
          
          bool ExecuteLua(void* L, const char* script) {
              if (!L || !lua_load) return false;
              
              // Simplified execution — full implementation would use luaL_loadstring
              lua_getglobal(L, "loadstring");
              lua_pushstring(L, script);
              if (lua_pcall(L, 1, 1, 0) != 0) {
                  lua_pop(L, 1);
                  return false;
              }
              if (lua_pcall(L, 0, 0, 0) != 0) {
                  lua_pop(L, 1);
                  return false;
              }
              return true;
          }
          
          // HTTP server to serve HTML GUI
          void* HttpServerThread(void* arg) {
              int server_fd = socket(AF_INET, SOCK_STREAM, 0);
              int opt = 1;
              setsockopt(server_fd, SOL_SOCKET, SO_REUSEADDR, &opt, sizeof(opt));
              
              struct sockaddr_in addr;
              addr.sin_family = AF_INET;
              addr.sin_port = htons(1337);
              addr.sin_addr.s_addr = INADDR_ANY;
              
              bind(server_fd, (struct sockaddr*)&addr, sizeof(addr));
              listen(server_fd, 5);
              
              const char* html = "<!DOCTYPE html><html><head><title>Mystrix Executor</title><style>/* Your exact design here — compressed */</style></head><body>"
                                 "<div id='app'><textarea id='script' rows='20' cols='80'>print('Hello from dylib')</textarea><br>"
                                 "<button onclick='execute()'>Execute</button><button onclick='save()'>Save</button>"
                                 "<script>function execute(){fetch('/exec',{method:'POST',body:document.getElementById('script').value})}</script></div></body></html>";
              
              while (1) {
                  int client = accept(server_fd, NULL, NULL);
                  char buffer[8192] = {0};
                  recv(client, buffer, sizeof(buffer), 0);
                  
                  if (strstr(buffer, "POST /exec")) {
                      char* body = strstr(buffer, "\r\n\r\n");
                      if (body) {
                          body += 4;
                          ExecuteLua(g_lua_state, body);
                      }
                      const char* resp = "HTTP/1.1 200 OK\r\n\r\nOK";
                      send(client, resp, strlen(resp), 0);
                  } else {
                      char resp[8192];
                      snprintf(resp, sizeof(resp), "HTTP/1.1 200 OK\r\nContent-Type: text/html\r\n\r\n%s", html);
                      send(client, resp, strlen(resp), 0);
                  }
                  close(client);
              }
              return nullptr;
          }
          
          __attribute__((constructor)) void Initialize() {
              NSLog(@"[Mystrix] Dylib loaded");
              FindLuaSymbols();
              g_lua_state = GetRobloxLuaState();
              
              pthread_t thread;
              pthread_create(&thread, NULL, HttpServerThread, NULL);
              
              // Open browser
              system("open http://localhost:1337");
              
              // Auto-execute saved script
              NSString* path = [NSHomeDirectory() stringByAppendingPathComponent:@".mystrix_auto.lua"];
              if ([[NSFileManager defaultManager] fileExistsAtPath:path]) {
                  NSString* script = [NSString stringWithContentsOfFile:path encoding:NSUTF8StringEncoding error:nil];
                  if (script && g_lua_state) {
                      ExecuteLua(g_lua_state, [script UTF8String]);
                  }
              }
          }
          EOF
          
          # === INJECTOR (macOS) ===
          cat > src/injector.mm << 'EOF'
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <dlfcn.h>
          
          int main(int argc, const char* argv[]) {
              // Find Roblox PID
              NSWorkspace* ws = [NSWorkspace sharedWorkspace];
              NSArray* apps = [ws runningApplications];
              pid_t target_pid = 0;
              
              for (NSRunningApplication* app in apps) {
                  if ([[app bundleIdentifier] containsString:@"com.roblox.Roblox"]) {
                      target_pid = [app processIdentifier];
                      break;
                  }
              }
              
              if (!target_pid) {
                  NSLog(@"Roblox not running");
                  return 1;
              }
              
              // Inject dylib using task_for_pid (requires SIP disabled)
              char inject_path[4096];
              strcpy(inject_path, argv[0]);
              strcpy(strrchr(inject_path, '/') + 1, "executor.dylib");
              
              NSString* cmd = [NSString stringWithFormat:@"sudo -n insert_dylib %s %d", inject_path, target_pid];
              system([cmd UTF8String]);
              
              NSLog(@"Injected into PID %d", target_pid);
              return 0;
          }
          EOF
          
          # === LAUNCH SCRIPT ===
          cat > launch.sh << 'EOF'
          #!/bin/bash
          chmod +x injector
          ./injector
          EOF
          chmod +x launch.sh

      - name: Compile dylib and injector
        run: |
          cd src
          # Compile dylib
          clang++ -dynamiclib -o executor.dylib executor.mm -framework Foundation -framework AppKit
          
          # Compile injector
          clang++ -o injector injector.mm -framework Foundation
          
          # Move to output
          cd ..
          mkdir output
          cp src/executor.dylib output/
          cp src/injector output/
          cp launch.sh output/
          
          # Create HTML GUI full version
          cat > output/gui.html << 'HTMLDONE'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Mystrix Hub | Executor</title>
              <style>
                  /* Your complete design here — paste your exact CSS */
                  :root {
                      --accent-main: #00d4ff;
                      --accent-hover: #00b8e6;
                      --accent-glow: rgba(0,212,255,0.3);
                      --bg-dark: #0a0a0a;
                      --panel-bg: rgba(20,20,20,0.75);
                      --sidebar-bg: rgba(15,15,15,0.85);
                      --border-color: rgba(255,255,255,0.08);
                      --text-main: #e0e0e0;
                      --text-dim: #888888;
                      --radius: 12px;
                  }
                  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
                  body { height:100vh; background:radial-gradient(circle at center, #111 0%, #050505 100%); display:flex; align-items:center; justify-content:center; overflow:hidden; font-family:'Segoe UI',sans-serif; }
                  .executor-window { width:850px; height:500px; background:var(--panel-bg); backdrop-filter:blur(20px); border:1px solid var(--border-color); border-radius:var(--radius); display:flex; flex-direction:column; overflow:hidden; }
                  .title-bar { height:40px; background:rgba(255,255,255,0.03); border-bottom:1px solid var(--border-color); display:flex; align-items:center; padding:0 15px; justify-content:space-between; }
                  .logo-box { width:24px; height:24px; background:var(--accent-main); border-radius:4px; display:flex; align-items:center; justify-content:center; font-weight:900; }
                  .main-content { display:flex; flex:1; overflow:hidden; }
                  .sidebar { width:180px; background:var(--sidebar-bg); border-right:1px solid var(--border-color); }
                  .tab-item { padding:10px 20px; color:var(--text-dim); cursor:pointer; }
                  .tab-item.active { color:var(--accent-main); border-left:2px solid var(--accent-main); }
                  .editor-container { flex:1; display:flex; flex-direction:column; }
                  .code-view { flex:1; padding:10px; font-family:monospace; background:rgba(0,0,0,0.2); overflow:auto; }
                  .code-content { width:100%; height:100%; background:transparent; color:var(--text-main); border:none; outline:none; font-family:monospace; resize:none; }
                  .bottom-bar { height:50px; border-top:1px solid var(--border-color); display:flex; align-items:center; padding:0 15px; gap:10px; }
                  .btn { padding:6px 18px; background:rgba(255,255,255,0.05); border:1px solid var(--border-color); border-radius:4px; color:var(--text-main); cursor:pointer; }
                  .btn-primary { border-color:var(--accent-main); color:var(--accent-main); }
                  .status-dot { width:8px; height:8px; background:#ff4444; border-radius:50%; }
              </style>
          </head>
          <body>
          <div class="executor-window">
              <div class="title-bar"><div class="title-left"><div class="logo-box">M</div><div class="title-text">MYSTRIX HUB</div></div><div class="window-controls"><span>—</span><span>▢</span><span>✕</span></div></div>
              <div class="main-content">
                  <div class="sidebar"><div class="tab-item active">Executor</div><div class="tab-item">Saved Scripts</div><div class="tab-item">Auto-Execute</div></div>
                  <div class="editor-container"><div class="code-view"><textarea id="scriptArea" class="code-content" placeholder="-- Write Lua script here\nloadstring('print(\"Hello\")')()"></textarea></div></div>
              </div>
              <div class="bottom-bar"><button class="btn btn-primary" id="executeBtn">EXECUTE</button><button class="btn" id="saveBtn">SAVE</button><button class="btn" id="loadBtn">LOAD</button><div class="spacer"></div><div class="status-dot" id="statusDot"></div><div class="status-text" id="statusText">Connected</div></div>
          </div>
          <script>
              async function executeScript(code) {
                  let resp = await fetch('http://localhost:1337/exec', {method:'POST', body:code});
                  let result = await resp.text();
                  console.log('Executed:', result);
              }
              document.getElementById('executeBtn').onclick = () => {
                  let code = document.getElementById('scriptArea').value;
                  executeScript(code);
              };
              document.getElementById('saveBtn').onclick = () => {
                  let code = document.getElementById('scriptArea').value;
                  localStorage.setItem('saved_script', code);
                  alert('Saved locally');
              };
              document.getElementById('loadBtn').onclick = () => {
                  let saved = localStorage.getItem('saved_script');
                  if(saved) document.getElementById('scriptArea').value = saved;
              };
              // Auto-execute on page load if enabled
              if(localStorage.getItem('autoexec') === 'true') {
                  executeScript(localStorage.getItem('saved_script') || 'print("Auto-executed")');
              }
              document.querySelector('.tab-item:nth-child(3)').onclick = () => {
                  let enabled = localStorage.getItem('autoexec') === 'true';
                  localStorage.setItem('autoexec', !enabled);
                  alert(`Auto-execute: ${!enabled ? 'ON' : 'OFF'}`);
              };
          </script>
          </body>
          </html>
          HTMLDONE

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mystrix-executor-macos
          path: output/
