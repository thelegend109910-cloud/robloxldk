name: Build LegendDelta dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Create Objective-C++ source code
        run: |
          cat > LegendMenu.mm << 'EOF'
          #import <UIKit/UIKit.h>
          #include <stdio.h>
          
          @interface LegendMenu : UIView
          @property (nonatomic, strong) UITextView *scriptBox;
          @property (nonatomic, strong) UIButton *execButton;
          @property (nonatomic, strong) UIButton *closeButton;
          @end
          
          @implementation LegendMenu
          
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [UIColor colorWithRed:0.1 green:0.1 blue:0.1 alpha:0.9];
                  self.layer.cornerRadius = 12;
                  self.layer.borderWidth = 2;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  
                  // Label
                  UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(0, 5, frame.size.width, 20)];
                  title.text = @"LEGEND DELTA v1";
                  title.textColor = [UIColor whiteColor];
                  title.textAlignment = NSTextAlignmentCenter;
                  title.font = [UIFont boldSystemFontOfSize:14];
                  [self addSubview:title];
          
                  // Script Input Area
                  self.scriptBox = [[UITextView alloc] initWithFrame:CGRectMake(10, 30, frame.size.width - 20, 100)];
                  self.scriptBox.backgroundColor = [UIColor blackColor];
                  self.scriptBox.textColor = [UIColor greenColor];
                  self.scriptBox.layer.cornerRadius = 5;
                  self.scriptBox.text = @"-- Paste Script Here";
                  [self addSubview:self.scriptBox];
          
                  // Execute Button
                  self.execButton = [UIButton buttonWithType:UIButtonTypeSystem];
                  self.execButton.frame = CGRectMake(10, 140, 100, 40);
                  [self.execButton setTitle:@"EXECUTE" forState:UIControlStateNormal];
                  [self.execButton setBackgroundColor:[UIColor cyanColor]];
                  [self.execButton setTitleColor:[UIColor blackColor] forState:UIControlStateNormal];
                  self.execButton.layer.cornerRadius = 8;
                  [self.execButton addTarget:self action:@selector(runScript) forControlEvents:UIControlEventTouchUpInside];
                  [self addSubview:self.execButton];
                  
                  // Close Button
                  self.closeButton = [UIButton buttonWithType:UIButtonTypeSystem];
                  self.closeButton.frame = CGRectMake(frame.size.width - 40, 5, 30, 30);
                  [self.closeButton setTitle:@"X" forState:UIControlStateNormal];
                  [self.closeButton setTitleColor:[UIColor redColor] forState:UIControlStateNormal];
                  [self.closeButton addTarget:self action:@selector(hideMenu) forControlEvents:UIControlEventTouchUpInside];
                  [self addSubview:self.closeButton];
          
                  // Make it draggable
                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [self addGestureRecognizer:pan];
              }
              return self;
          }
          
          - (void)handlePan:(UIPanGestureRecognizer *)gesture {
              CGPoint translation = [gesture translationInView:self.superview];
              self.center = CGPointMake(self.center.x + translation.x, self.center.y + translation.y);
              [gesture setTranslation:CGPointZero inView:self.superview];
          }
          
          - (void)runScript {
              const char* code = [self.scriptBox.text UTF8String];
              printf("Protocol 99: Executing Code: %s\n", code);
              // Real logic to talk to Roblox goes here
          }
          
          - (void)hideMenu {
              self.hidden = YES;
          }
          @end
          
          static void __attribute__((constructor)) initialize() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *win = [[UIApplication sharedApplication] keyWindow];
                  LegendMenu *menu = [[LegendMenu alloc] initWithFrame:CGRectMake(100, 100, 250, 200)];
                  [win addSubview:menu];
              });
          }
          EOF
      
      - name: Compile dylib for arm64 iOS
        run: |
          echo "Compiling LegendDelta.dylib..."
          clang++ -dynamiclib \
            -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -miphoneos-version-min=13.0 \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -framework QuartzCore \
            -ObjC++ \
            -o LegendDelta.dylib \
            LegendMenu.mm
          
          # Verify compilation
          if [ -f LegendDelta.dylib ]; then
            echo "✅ Compilation successful!"
            file LegendDelta.dylib
            otool -L LegendDelta.dylib
          else
            echo "❌ Compilation failed!"
            exit 1
          fi
      
      - name: Upload dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: LegendDelta-Dylib
          path: LegendDelta.dylib
