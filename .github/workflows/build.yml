name: Build Legend Delta Executor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Create Objective-C source code
        run: |
          cat > LegendDelta.m << 'EOF'
          #import <UIKit/UIKit.h>
          
          @interface LDOverlayWindow : UIWindow
          @end
          
          @implementation LDOverlayWindow
          - (instancetype)init {
              self = [super initWithFrame:[UIScreen mainScreen].bounds];
              if (self) {
                  self.windowLevel = UIWindowLevelStatusBar + 100;
                  self.backgroundColor = [UIColor clearColor];
                  self.hidden = NO;
              }
              return self;
          }
          
          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              UIView *hitView = [super hitTest:point withEvent:event];
              if (hitView == self || hitView == self.rootViewController.view) {
                  return nil;
              }
              return hitView;
          }
          @end
          
          @interface LDFloatingButton : UIView
          @property (nonatomic, copy) void (^onTap)(void);
          @end
          
          @implementation LDFloatingButton
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
                  self.layer.cornerRadius = frame.size.width / 2;
                  self.layer.shadowColor = [UIColor cyanColor].CGColor;
                  self.layer.shadowRadius = 12;
                  self.layer.shadowOpacity = 0.8;
                  self.layer.shadowOffset = CGSizeZero;
                  self.userInteractionEnabled = YES;
                  
                  UILabel *label = [[UILabel alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, frame.size.height)];
                  label.text = @"L";
                  label.textAlignment = NSTextAlignmentCenter;
                  label.font = [UIFont boldSystemFontOfSize:28];
                  label.textColor = [UIColor whiteColor];
                  label.userInteractionEnabled = NO;
                  [self addSubview:label];
                  
                  UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(handleTap)];
                  [self addGestureRecognizer:tap];
                  
                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [self addGestureRecognizer:pan];
              }
              return self;
          }
          
          - (void)handleTap {
              if (self.onTap) self.onTap();
          }
          
          - (void)handlePan:(UIPanGestureRecognizer *)gesture {
              CGPoint translation = [gesture translationInView:self.superview];
              self.center = CGPointMake(self.center.x + translation.x, self.center.y + translation.y);
              [gesture setTranslation:CGPointZero inView:self.superview];
          }
          @end
          
          @interface LDExecutorPanel : UIView <UITableViewDelegate, UITableViewDataSource, UITextViewDelegate>
          @property (nonatomic, strong) UITextView *codeEditor;
          @property (nonatomic, strong) UITableView *scriptTable;
          @property (nonatomic, strong) UISearchBar *searchBar;
          @property (nonatomic, strong) NSMutableArray *scripts;
          @property (nonatomic, copy) void (^onExecute)(NSString *code);
          @property (nonatomic, copy) void (^onClose)(void);
          @end
          
          @implementation LDExecutorPanel
          
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.12 alpha:0.95];
                  self.layer.cornerRadius = 20;
                  self.layer.borderWidth = 1.5;
                  self.layer.borderColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:0.6].CGColor;
                  self.clipsToBounds = YES;
                  self.userInteractionEnabled = YES;
                  
                  [self setupScripts];
                  [self setupUI];
              }
              return self;
          }
          
          - (void)setupScripts {
              self.scripts = [NSMutableArray array];
              [self.scripts addObject:@{@"name": @"Infinite Yield", @"author": @"Edge", @"code": @"loadstring(game:HttpGet('https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source'))()"}];
              [self.scripts addObject:@{@"name": @"CMD-X", @"author": @"CMD-X Team", @"code": @"loadstring(game:HttpGet('https://raw.githubusercontent.com/CMD-X/CMD-X/master/Source', true))()"}];
              [self.scripts addObject:@{@"name": @"Dex Explorer", @"author": @"Dex", @"code": @"loadstring(game:HttpGet('https://raw.githubusercontent.com/pepega90/Dex-Explorer/main/Source.lua'))()"}];
              [self.scripts addObject:@{@"name": @"Auto Farm", @"author": @"Legend", @"code": @"print('Auto Farm Started')\nlocal player = game.Players.LocalPlayer"}];
              [self.scripts addObject:@{@"name": @"Fly + NoClip", @"author": @"Delta", @"code": @"local plr = game.Players.LocalPlayer\nlocal char = plr.Character\nlocal root = char.HumanoidRootPart\nlocal bv = Instance.new('BodyVelocity')\nbv.MaxForce = Vector3.new(1,1,1)*1e5\nbv.Parent = root\ngame:GetService('UserInputService').InputBegan:connect(function(inp)\n    if inp.KeyCode == Enum.KeyCode.Space then\n        bv.Velocity = workspace.CurrentCamera.CFrame.LookVector * 100\n    end\nend)"}];
          }
          
          - (void)setupUI {
              CGFloat w = self.frame.size.width;
              CGFloat h = self.frame.size.height;
              
              // Title bar
              UIView *titleBar = [[UIView alloc] initWithFrame:CGRectMake(0, 0, w, 50)];
              titleBar.backgroundColor = [UIColor colorWithRed:0.0 green:0.15 blue:0.25 alpha:0.95];
              titleBar.userInteractionEnabled = YES;
              
              UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(50, 10, 150, 30)];
              title.text = @"LEGEND DELTA";
              title.font = [UIFont boldSystemFontOfSize:20];
              title.textColor = [UIColor whiteColor];
              [titleBar addSubview:title];
              
              UILabel *logo = [[UILabel alloc] initWithFrame:CGRectMake(15, 8, 35, 35)];
              logo.text = @"L";
              logo.font = [UIFont boldSystemFontOfSize:26];
              logo.textColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [titleBar addSubview:logo];
              
              UIButton *closeBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              closeBtn.frame = CGRectMake(w - 45, 8, 35, 35);
              [closeBtn setTitle:@"✕" forState:UIControlStateNormal];
              [closeBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              closeBtn.titleLabel.font = [UIFont boldSystemFontOfSize:20];
              closeBtn.backgroundColor = [UIColor colorWithRed:0.8 green:0.2 blue:0.2 alpha:0.8];
              closeBtn.layer.cornerRadius = 17.5;
              [closeBtn addTarget:self action:@selector(closePanel) forControlEvents:UIControlEventTouchUpInside];
              [titleBar addSubview:closeBtn];
              
              // Tab bar
              UIView *tabBar = [[UIView alloc] initWithFrame:CGRectMake(0, 50, w, 40)];
              tabBar.backgroundColor = [UIColor colorWithRed:0.08 green:0.08 blue:0.15 alpha:0.9];
              
              NSArray *tabs = @[@"Editor", @"Library", @"Settings"];
              for (int i = 0; i < 3; i++) {
                  UIButton *btn = [UIButton buttonWithType:UIButtonTypeSystem];
                  btn.frame = CGRectMake(10 + (i * 90), 5, 80, 30);
                  [btn setTitle:tabs[i] forState:UIControlStateNormal];
                  [btn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
                  btn.tag = i;
                  [btn addTarget:self action:@selector(switchTab:) forControlEvents:UIControlEventTouchUpInside];
                  [tabBar addSubview:btn];
              }
              
              // Code editor
              self.codeEditor = [[UITextView alloc] initWithFrame:CGRectMake(10, 95, w - 20, h - 190)];
              self.codeEditor.backgroundColor = [UIColor colorWithRed:0.02 green:0.02 blue:0.06 alpha:1.0];
              self.codeEditor.textColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              self.codeEditor.font = [UIFont fontWithName:@"Menlo" size:13];
              self.codeEditor.layer.cornerRadius = 10;
              self.codeEditor.text = @"-- Legend Delta Executor\n-- Paste your script here\n\nprint('Hello World!')";
              self.codeEditor.delegate = self;
              
              // Execute button
              UIButton *execBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              execBtn.frame = CGRectMake(w/2 - 70, h - 85, 140, 40);
              [execBtn setTitle:@"▶ EXECUTE" forState:UIControlStateNormal];
              [execBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              execBtn.titleLabel.font = [UIFont boldSystemFontOfSize:14];
              execBtn.backgroundColor = [UIColor colorWithRed:0.0 green:0.6 blue:0.7 alpha:1.0];
              execBtn.layer.cornerRadius = 20;
              [execBtn addTarget:self action:@selector(executeScript) forControlEvents:UIControlEventTouchUpInside];
              
              // Search bar
              self.searchBar = [[UISearchBar alloc] initWithFrame:CGRectMake(10, 95, w - 20, 45)];
              self.searchBar.placeholder = @"Search scripts...";
              self.searchBar.backgroundColor = [UIColor clearColor];
              self.searchBar.searchTextField.backgroundColor = [UIColor colorWithRed:0.1 green:0.1 blue:0.2 alpha:1.0];
              self.searchBar.searchTextField.textColor = [UIColor whiteColor];
              self.searchBar.hidden = YES;
              
              // Script table
              self.scriptTable = [[UITableView alloc] initWithFrame:CGRectMake(10, 145, w - 20, h - 200) style:UITableViewStylePlain];
              self.scriptTable.backgroundColor = [UIColor clearColor];
              self.scriptTable.separatorColor = [UIColor colorWithWhite:0.2 alpha:0.5];
              self.scriptTable.delegate = self;
              self.scriptTable.dataSource = self;
              self.scriptTable.hidden = YES;
              
              // Settings panel
              UIView *settingsView = [[UIView alloc] initWithFrame:CGRectMake(10, 95, w - 20, h - 150)];
              settingsView.backgroundColor = [UIColor clearColor];
              settingsView.hidden = YES;
              
              UILabel *scaleLabel = [[UILabel alloc] initWithFrame:CGRectMake(10, 20, 200, 25)];
              scaleLabel.text = @"UI Scale: 100%";
              scaleLabel.textColor = [UIColor whiteColor];
              [settingsView addSubview:scaleLabel];
              
              UISlider *scaleSlider = [[UISlider alloc] initWithFrame:CGRectMake(10, 50, w - 40, 30)];
              scaleSlider.minimumValue = 0.7;
              scaleSlider.maximumValue = 1.3;
              scaleSlider.value = 1.0;
              scaleSlider.tintColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [scaleSlider addTarget:self action:@selector(changeScale:) forControlEvents:UIControlEventValueChanged];
              [settingsView addSubview:scaleSlider];
              
              UISwitch *borderSwitch = [[UISwitch alloc] initWithFrame:CGRectMake(10, 100, 50, 30)];
              borderSwitch.on = YES;
              borderSwitch.onTintColor = [UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0];
              [borderSwitch addTarget:self action:@selector(toggleBorder:) forControlEvents:UIControlEventValueChanged];
              [settingsView addSubview:borderSwitch];
              
              UILabel *borderLabel = [[UILabel alloc] initWithFrame:CGRectMake(70, 103, 150, 25)];
              borderLabel.text = @"Window Borders";
              borderLabel.textColor = [UIColor whiteColor];
              [settingsView addSubview:borderLabel];
              
              // Add everything
              [self addSubview:titleBar];
              [self addSubview:tabBar];
              [self addSubview:self.codeEditor];
              [self addSubview:execBtn];
              [self addSubview:self.searchBar];
              [self addSubview:self.scriptTable];
              [self addSubview:settingsView];
              
              // Store references
              objc_setAssociatedObject(self, "settingsView", settingsView, OBJC_ASSOCIATION_RETAIN_NONATOMIC);
          }
          
          - (void)switchTab:(UIButton *)sender {
              self.codeEditor.hidden = YES;
              self.searchBar.hidden = YES;
              self.scriptTable.hidden = YES;
              
              UIView *settingsView = objc_getAssociatedObject(self, "settingsView");
              settingsView.hidden = YES;
              
              if (sender.tag == 0) {
                  self.codeEditor.hidden = NO;
              } else if (sender.tag == 1) {
                  self.searchBar.hidden = NO;
                  self.scriptTable.hidden = NO;
                  [self.scriptTable reloadData];
              } else if (sender.tag == 2) {
                  settingsView.hidden = NO;
              }
          }
          
          - (void)executeScript {
              if (self.onExecute) {
                  self.onExecute(self.codeEditor.text);
              }
              
              // Show success notification
              UIView *notif = [[UIView alloc] initWithFrame:CGRectMake(10, 55, self.frame.size.width - 20, 40)];
              notif.backgroundColor = [UIColor colorWithRed:0.0 green:0.7 blue:0.3 alpha:0.95];
              notif.layer.cornerRadius = 10;
              
              UILabel *msg = [[UILabel alloc] initWithFrame:CGRectMake(10, 10, notif.frame.size.width - 20, 20)];
              msg.text = @"✅ Script executed!";
              msg.textColor = [UIColor whiteColor];
              msg.font = [UIFont boldSystemFontOfSize:13];
              msg.textAlignment = NSTextAlignmentCenter;
              [notif addSubview:msg];
              
              [self addSubview:notif];
              
              [UIView animateWithDuration:2.0 animations:^{
                  notif.alpha = 0;
              } completion:^(BOOL finished) {
                  [notif removeFromSuperview];
              }];
          }
          
          - (void)closePanel {
              if (self.onClose) self.onClose();
          }
          
          - (void)changeScale:(UISlider *)slider {
              CGFloat scale = slider.value;
              self.transform = CGAffineTransformMakeScale(scale, scale);
              self.center = self.superview.center;
          }
          
          - (void)toggleBorder:(UISwitch *)sw {
              self.layer.borderWidth = sw.on ? 1.5 : 0;
          }
          
          // UITableView methods
          - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section {
              return self.scripts.count;
          }
          
          - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {
              UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@"Cell"];
              if (!cell) {
                  cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleSubtitle reuseIdentifier:@"Cell"];
                  cell.backgroundColor = [UIColor colorWithRed:0.08 green:0.08 blue:0.12 alpha:1.0];
                  cell.textLabel.textColor = [UIColor whiteColor];
                  cell.detailTextLabel.textColor = [UIColor lightGrayColor];
              }
              
              NSDictionary *script = self.scripts[indexPath.row];
              cell.textLabel.text = script[@"name"];
              cell.detailTextLabel.text = [NSString stringWithFormat:@"by %@", script[@"author"]];
              
              UIButton *runBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              runBtn.frame = CGRectMake(self.scriptTable.frame.size.width - 75, 8, 65, 30);
              [runBtn setTitle:@"▶ RUN" forState:UIControlStateNormal];
              [runBtn setTitleColor:[UIColor colorWithRed:0.0 green:0.831 blue:1.0 alpha:1.0] forState:UIControlStateNormal];
              runBtn.backgroundColor = [UIColor colorWithRed:0.0 green:0.3 blue:0.4 alpha:0.8];
              runBtn.layer.cornerRadius = 8;
              runBtn.tag = indexPath.row;
              [runBtn addTarget:self action:@selector(runScript:) forControlEvents:UIControlEventTouchUpInside];
              [cell.contentView addSubview:runBtn];
              
              return cell;
          }
          
          - (void)runScript:(UIButton *)sender {
              NSDictionary *script = self.scripts[sender.tag];
              self.codeEditor.text = script[@"code"];
              [self switchTab:[self viewWithTag:0]];
              [self executeScript];
          }
          
          - (CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath *)indexPath {
              return 55;
          }
          
          @end
          
          @interface LDAppDelegate : NSObject <UIApplicationDelegate>
          @property (nonatomic, strong) LDOverlayWindow *overlayWindow;
          @property (nonatomic, strong) LDFloatingButton *floatingButton;
          @property (nonatomic, strong) LDExecutorPanel *executorPanel;
          @property (nonatomic, assign) BOOL isPanelVisible;
          @end
          
          @implementation LDAppDelegate
          
          - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {
              dispatch_async(dispatch_get_main_queue(), ^{
                  [self setupOverlay];
              });
              return YES;
          }
          
          - (void)setupOverlay {
              self.overlayWindow = [[LDOverlayWindow alloc] init];
              
              CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
              CGFloat screenHeight = [UIScreen mainScreen].bounds.size.height;
              
              // Floating button
              self.floatingButton = [[LDFloatingButton alloc] initWithFrame:CGRectMake(screenWidth - 65, screenHeight - 120, 55, 55)];
              __weak typeof(self) weakSelf = self;
              self.floatingButton.onTap = ^{
                  [weakSelf togglePanel];
              };
              [self.overlayWindow addSubview:self.floatingButton];
              
              // Executor panel
              self.executorPanel = [[LDExecutorPanel alloc] initWithFrame:CGRectMake(10, 50, screenWidth - 20, screenHeight - 100)];
              self.executorPanel.hidden = YES;
              self.executorPanel.onExecute = ^(NSString *code) {
                  printf("[Legend Delta] Executing:\n%s\n", [code UTF8String]);
              };
              self.executorPanel.onClose = ^{
                  [weakSelf hidePanel];
              };
              [self.overlayWindow addSubview:self.executorPanel];
              
              self.isPanelVisible = NO;
          }
          
          - (void)togglePanel {
              if (self.isPanelVisible) {
                  [self hidePanel];
              } else {
                  [self showPanel];
              }
          }
          
          - (void)showPanel {
              self.isPanelVisible = YES;
              self.executorPanel.hidden = NO;
              self.executorPanel.transform = CGAffineTransformMakeScale(0.9, 0.9);
              self.executorPanel.alpha = 0;
              [UIView animateWithDuration:0.25 animations:^{
                  self.executorPanel.transform = CGAffineTransformIdentity;
                  self.executorPanel.alpha = 1;
              }];
          }
          
          - (void)hidePanel {
              self.isPanelVisible = NO;
              [UIView animateWithDuration:0.25 animations:^{
                  self.executorPanel.transform = CGAffineTransformMakeScale(0.9, 0.9);
                  self.executorPanel.alpha = 0;
              } completion:^(BOOL finished) {
                  self.executorPanel.hidden = YES;
                  self.executorPanel.transform = CGAffineTransformIdentity;
              }];
          }
          
          @end
          
          // Swizzle app delegate
          static void __attribute__((constructor)) init() {
              dispatch_async(dispatch_get_main_queue(), ^{
                  UIApplication *app = [UIApplication sharedApplication];
                  id<UIApplicationDelegate> originalDelegate = app.delegate;
                  
                  LDAppDelegate *newDelegate = [[LDAppDelegate alloc] init];
                  
                  if ([originalDelegate respondsToSelector:@selector(application:didFinishLaunchingWithOptions:)]) {
                      [newDelegate application:app didFinishLaunchingWithOptions:nil];
                  }
                  
                  [app setDelegate:newDelegate];
              });
          }
          EOF
      
      - name: Compile dylib
        run: |
          clang -dynamiclib \
            -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -fobjc-arc \
            -o LegendDelta.dylib \
            LegendDelta.m
          
          if [ -f LegendDelta.dylib ]; then
            echo "✅ Compilation successful!"
            file LegendDelta.dylib
          else
            echo "❌ Compilation failed!"
            exit 1
          fi
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Legend-Executor
          path: LegendExecutor.dylib
