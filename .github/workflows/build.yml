name: Build Mystrix Hub

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Compile Mystrix
        run: |
          clang++ -dynamiclib \
            -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -miphoneos-version-min=14.0 \
            -framework Foundation \
            -framework UIKit \
            -framework WebKit \
            -framework CoreGraphics \
            -framework QuartzCore \
            -o Mystrix.dylib \
            main.mm
            
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Mystrix-Dylib
          path: Mystrix.dylib
