name: Build Legend Delta Executor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Create Objective-C source code
        run: |
          cat > LegendDelta.m << 'EOF'
          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          
          @interface LDSimpleButton : UIView
          @property (nonatomic, strong) UILabel *label;
          @property (nonatomic, copy) void (^onTap)(void);
          @end
          
          @implementation LDSimpleButton
          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [UIColor colorWithRed:0.0 green:0.8 blue:1.0 alpha:1.0];
                  self.layer.cornerRadius = frame.size.width / 2;
                  self.userInteractionEnabled = YES;
                  
                  self.label = [[UILabel alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, frame.size.height)];
                  self.label.text = @"L";
                  self.label.textAlignment = NSTextAlignmentCenter;
                  self.label.font = [UIFont boldSystemFontOfSize:28];
                  self.label.textColor = [UIColor whiteColor];
                  [self addSubview:self.label];
                  
                  UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(didTap)];
                  [self addGestureRecognizer:tap];
                  
                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(didPan:)];
                  [self addGestureRecognizer:pan];
              }
              return self;
          }
          
          - (void)didTap {
              if (self.onTap) self.onTap();
          }
          
          - (void)didPan:(UIPanGestureRecognizer *)gesture {
              CGPoint translation = [gesture translationInView:self.superview];
              self.center = CGPointMake(self.center.x + translation.x, self.center.y + translation.y);
              [gesture setTranslation:CGPointZero inView:self.superview];
          }
          @end
          
          @interface LDMainViewController : UIViewController
          @property (nonatomic, strong) LDSimpleButton *floatingButton;
          @property (nonatomic, strong) UIView *executorPanel;
          @property (nonatomic, strong) UITextView *codeEditor;
          @property (nonatomic, strong) UIButton *executeButton;
          @property (nonatomic, assign) BOOL isPanelVisible;
          @end
          
          @implementation LDMainViewController
          
          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor clearColor];
              self.isPanelVisible = NO;
              
              [self setupFloatingButton];
              [self setupExecutorPanel];
          }
          
          - (void)setupFloatingButton {
              CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
              CGFloat screenHeight = [UIScreen mainScreen].bounds.size.height;
              
              self.floatingButton = [[LDSimpleButton alloc] initWithFrame:CGRectMake(screenWidth - 65, screenHeight - 120, 55, 55)];
              __weak typeof(self) weakSelf = self;
              self.floatingButton.onTap = ^{
                  [weakSelf togglePanel];
              };
              [self.view addSubview:self.floatingButton];
          }
          
          - (void)setupExecutorPanel {
              CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;
              CGFloat screenHeight = [UIScreen mainScreen].bounds.size.height;
              
              // Main panel
              self.executorPanel = [[UIView alloc] initWithFrame:CGRectMake(10, 50, screenWidth - 20, screenHeight - 100)];
              self.executorPanel.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.12 alpha:0.95];
              self.executorPanel.layer.cornerRadius = 20;
              self.executorPanel.layer.borderWidth = 1;
              self.executorPanel.layer.borderColor = [UIColor colorWithRed:0.0 green:0.8 blue:1.0 alpha:0.6].CGColor;
              self.executorPanel.clipsToBounds = YES;
              self.executorPanel.hidden = YES;
              self.executorPanel.userInteractionEnabled = YES;
              
              // Title bar
              UIView *titleBar = [[UIView alloc] initWithFrame:CGRectMake(0, 0, self.executorPanel.frame.size.width, 45)];
              titleBar.backgroundColor = [UIColor colorWithRed:0.0 green:0.15 blue:0.25 alpha:0.95];
              titleBar.userInteractionEnabled = YES;
              
              UILabel *titleLabel = [[UILabel alloc] initWithFrame:CGRectMake(50, 10, 200, 25)];
              titleLabel.text = @"LEGEND DELTA";
              titleLabel.font = [UIFont boldSystemFontOfSize:18];
              titleLabel.textColor = [UIColor whiteColor];
              [titleBar addSubview:titleLabel];
              
              UILabel *logoLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 8, 30, 30)];
              logoLabel.text = @"L";
              logoLabel.font = [UIFont boldSystemFontOfSize:22];
              logoLabel.textColor = [UIColor colorWithRed:0.0 green:0.8 blue:1.0 alpha:1.0];
              [titleBar addSubview:logoLabel];
              
              UIButton *closeBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              closeBtn.frame = CGRectMake(self.executorPanel.frame.size.width - 45, 8, 35, 35);
              [closeBtn setTitle:@"✕" forState:UIControlStateNormal];
              [closeBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              closeBtn.backgroundColor = [UIColor colorWithRed:0.8 green:0.2 blue:0.2 alpha:0.8];
              closeBtn.layer.cornerRadius = 17.5;
              [closeBtn addTarget:self action:@selector(hidePanel) forControlEvents:UIControlEventTouchUpInside];
              [titleBar addSubview:closeBtn];
              
              // Code editor
              self.codeEditor = [[UITextView alloc] initWithFrame:CGRectMake(10, 55, self.executorPanel.frame.size.width - 20, self.executorPanel.frame.size.height - 130)];
              self.codeEditor.backgroundColor = [UIColor colorWithRed:0.02 green:0.02 blue:0.06 alpha:1.0];
              self.codeEditor.textColor = [UIColor colorWithRed:0.0 green:0.8 blue:1.0 alpha:1.0];
              self.codeEditor.font = [UIFont fontWithName:@"Menlo" size:13];
              self.codeEditor.layer.cornerRadius = 10;
              self.codeEditor.text = @"-- Legend Delta Executor\n-- Paste your Lua script here\n\nprint('Hello World!')";
              self.codeEditor.userInteractionEnabled = YES;
              
              // Execute button
              self.executeButton = [UIButton buttonWithType:UIButtonTypeSystem];
              self.executeButton.frame = CGRectMake(self.executorPanel.frame.size.width / 2 - 60, self.executorPanel.frame.size.height - 65, 120, 40);
              [self.executeButton setTitle:@"▶ EXECUTE" forState:UIControlStateNormal];
              [self.executeButton setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
              self.executeButton.titleLabel.font = [UIFont boldSystemFontOfSize:14];
              self.executeButton.backgroundColor = [UIColor colorWithRed:0.0 green:0.6 blue:0.7 alpha:1.0];
              self.executeButton.layer.cornerRadius = 20;
              [self.executeButton addTarget:self action:@selector(executeScript) forControlEvents:UIControlEventTouchUpInside];
              
              [self.executorPanel addSubview:titleBar];
              [self.executorPanel addSubview:self.codeEditor];
              [self.executorPanel addSubview:self.executeButton];
              
              [self.view addSubview:self.executorPanel];
          }
          
          - (void)togglePanel {
              if (self.isPanelVisible) {
                  [self hidePanel];
              } else {
                  [self showPanel];
              }
          }
          
          - (void)showPanel {
              self.isPanelVisible = YES;
              self.executorPanel.hidden = NO;
              self.executorPanel.transform = CGAffineTransformMakeScale(0.95, 0.95);
              self.executorPanel.alpha = 0;
              [UIView animateWithDuration:0.2 animations:^{
                  self.executorPanel.transform = CGAffineTransformIdentity;
                  self.executorPanel.alpha = 1;
              }];
          }
          
          - (void)hidePanel {
              self.isPanelVisible = NO;
              [UIView animateWithDuration:0.2 animations:^{
                  self.executorPanel.transform = CGAffineTransformMakeScale(0.95, 0.95);
                  self.executorPanel.alpha = 0;
              } completion:^(BOOL finished) {
                  self.executorPanel.hidden = YES;
                  self.executorPanel.transform = CGAffineTransformIdentity;
              }];
          }
          
          - (void)executeScript {
              NSString *script = self.codeEditor.text;
              printf("[Legend Delta] Executing script:\n%s\n", [script UTF8String]);
              
              // Show notification
              UILabel *notif = [[UILabel alloc] initWithFrame:CGRectMake(10, 50, self.executorPanel.frame.size.width - 20, 35)];
              notif.text = @"✅ Script Executed!";
              notif.textAlignment = NSTextAlignmentCenter;
              notif.backgroundColor = [UIColor colorWithRed:0.0 green:0.7 blue:0.3 alpha:0.9];
              notif.textColor = [UIColor whiteColor];
              notif.font = [UIFont boldSystemFontOfSize:14];
              notif.layer.cornerRadius = 10;
              notif.clipsToBounds = YES;
              [self.executorPanel addSubview:notif];
              
              [UIView animateWithDuration:2.0 animations:^{
                  notif.alpha = 0;
              } completion:^(BOOL finished) {
                  [notif removeFromSuperview];
              }];
          }
          
          @end
          
          @interface LDAppDelegate : UIResponder <UIApplicationDelegate>
          @property (nonatomic, strong) UIWindow *window;
          @property (nonatomic, strong) LDMainViewController *mainVC;
          @end
          
          @implementation LDAppDelegate
          
          - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {
              dispatch_async(dispatch_get_main_queue(), ^{
                  self.window = [[UIWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];
                  self.mainVC = [[LDMainViewController alloc] init];
                  self.window.rootViewController = self.mainVC;
                  self.window.windowLevel = UIWindowLevelAlert + 1;
                  self.window.backgroundColor = [UIColor clearColor];
                  [self.window makeKeyAndVisible];
              });
              return YES;
          }
          
          @end
          
          // Constructor
          __attribute__((constructor)) static void init() {
              printf("[Legend Delta] Loading...\n");
              dispatch_async(dispatch_get_main_queue(), ^{
                  LDAppDelegate *delegate = [[LDAppDelegate alloc] init];
                  [delegate application:[UIApplication sharedApplication] didFinishLaunchingWithOptions:nil];
              });
          }
          EOF
      
      - name: Compile dylib
        run: |
          echo "Compiling..."
          clang -dynamiclib \
            -arch arm64 \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -framework Foundation \
            -framework UIKit \
            -framework CoreGraphics \
            -fobjc-arc \
            -o LegendDelta.dylib \
            LegendDelta.m
          
          if [ -f LegendDelta.dylib ]; then
            echo "✅ SUCCESS!"
            ls -la LegendDelta.dylib
            file LegendDelta.dylib
          else
            echo "❌ FAILED"
            exit 1
          fi
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Legend-Executor
          path: Legend.dylib
