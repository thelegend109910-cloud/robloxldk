name: Get Cloud PC (Cloudflare Method)

on:
  workflow_dispatch:  # You tap "Run" in the GitHub app

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Runs for up to 6 hours

    steps:
      # 1. Install SSH Server
      - name: Install SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          sudo service ssh start
          sudo usermod --password $(echo "123456" | openssl passwd -1 -stdin) runner

      # 2. Install Cloudflared
      - name: Install Cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      # 3. Start Tunnel (No account or token needed for basic TCP)
      - name: Start Tunnel
        run: |
          echo "========================================="
          echo "Starting Cloudflare Tunnel..."
          echo "You will connect using 'ssh runner@localhost -p 22' via the tunnel"
          echo "Waiting for tunnel URL to generate..."
          echo "========================================="
          
          # Create tunnel to local SSH port 22
          cloudflared tunnel --url ssh://localhost:22 --no-autoupdate &
          
          # Give it time to start
          sleep 15
          
          # Try to get the URL from the logs
          timeout 30s journalctl -u cloudflared -f 2>/dev/null || true
          ps aux | grep cloudflared
          
          echo "========================================="
          echo "✅ TUNNEL ACTIVE"
          echo "Username: runner"
          echo "Password: 123456"
          echo "Run this command on your iPhone:"
          echo "ssh runner@[THE_URL_THAT_APPEARS_ABOVE]"
          echo "========================================="
          
          # Keep alive
          while sleep 60; do echo "Heartbeat... Tunnel Active"; done
